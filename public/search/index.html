<script>
(function () {
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  function tick() {
    var article = document.querySelector('.post-single');
    if (!article) return;
    var scrolled = window.scrollY - article.offsetTop;
    var total = article.offsetHeight - window.innerHeight;
    bar.style.width = Math.max(0, Math.min(100, (scrolled / total) * 100)) + '%';
  }
  window.addEventListener('scroll', tick, { passive: true });
  tick();
})();

<script>
(function () {
   
  var modalHtml = [
    '<div id="search-modal" class="search-modal" role="dialog" aria-modal="true" hidden>',
    '  <div class="search-modal-backdrop"></div>',
    '  <div class="search-modal-box">',
    '    <div class="search-modal-input-wrap">',
    '      <svg class="search-modal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"',
    '           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">',
    '        <circle cx="11" cy="11" r="8"></circle>',
    '        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
    '      </svg>',
    '      <input id="modal-search-input" type="text" autocomplete="off"',
    '             placeholder="搜索文章..." maxlength="64" aria-label="全局搜索">',
    '      <kbd class="search-modal-esc" aria-label="关闭">Esc</kbd>',
    '    </div>',
    '    <ul id="modal-search-results" class="search-modal-results" aria-label="搜索建议"></ul>',
    '    <div class="search-modal-footer">',
    '      <span><kbd>↑</kbd><kbd>↓</kbd> 导航</span>',
    '      <span><kbd>↵</kbd> 进入</span>',
    '      <span><kbd>Esc</kbd> 关闭</span>',
    '    </div>',
    '  </div>',
    '</div>'
  ].join('');
  document.body.insertAdjacentHTML('beforeend', modalHtml);

   
  var modal      = document.getElementById('search-modal');
  var backdrop   = modal.querySelector('.search-modal-backdrop');
  var mInput     = document.getElementById('modal-search-input');
  var mResults   = document.getElementById('modal-search-results');

  var fuseUrl    = '\/js\/fuse.basic.min.7d2f9d9726313c52eab7c5f56cf50497a24c71bff73b7e4b05b136e5c36f84a0.js';
  var fuseLoaded = false;
  var fuseLoading = false;
  var mFuse      = null;
  var indexLoaded = false;

   
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

   
  function hlChars(text, indices) {
    if (!indices || !indices.length) return esc(text);
    var chars = Array.from(text), out = '', i = 0;
    indices.forEach(function(pair) {
      out += esc(chars.slice(i, pair[0]).join(''));
      out += '<mark>' + esc(chars.slice(pair[0], pair[1] + 1).join('')) + '</mark>';
      i = pair[1] + 1;
    });
    return out + esc(chars.slice(i).join(''));
  }

  function snippet(text, indices, radius) {
    radius = radius || 60;
    if (!text) return '';
    if (!indices || !indices.length) return esc(text.slice(0, 120)) + (text.length > 120 ? '…' : '');
    var s = indices[0][0];
    var from = Math.max(0, s - radius);
    var to   = Math.min(text.length, s + radius * 2);
    var shifted = indices.map(function(p){ return [p[0]-from, p[1]-from]; })
                         .filter(function(p){ return p[0] >= 0 && p[1] < to-from+1; });
    return (from > 0 ? '…' : '') + hlChars(text.slice(from, to), shifted) + (to < text.length ? '…' : '');
  }

  function getIdx(matches, key) {
    var m = (matches || []).filter(function(x){ return x.key === key; })[0];
    return m ? m.indices : null;
  }

   
  function loadFuseAndIndex(cb) {
    function loadIndex() {
      if (indexLoaded) { cb(); return; }
      fetch('/index.json')
        .then(function(r){ return r.json(); })
        .then(function(data) {
          mFuse = new Fuse(data, {
            includeMatches: true,
            minMatchCharLength: 2,
            threshold: 0.4,
            ignoreLocation: true,
            keys: ['title', 'summary', 'content']
          });
          indexLoaded = true;
          cb();
        })
        .catch(function(){});
    }

    if (window.Fuse) { loadIndex(); return; }
    if (fuseLoading) {
      var wait = setInterval(function(){
        if (window.Fuse) { clearInterval(wait); loadIndex(); }
      }, 80);
      return;
    }
    fuseLoading = true;
    var s = document.createElement('script');
    s.src = fuseUrl;
    s.onload = function(){ fuseLoaded = true; loadIndex(); };
    document.head.appendChild(s);
  }

   
  function renderResults(query) {
    if (!mFuse || !query) { mResults.innerHTML = ''; return; }
    var results = mFuse.search(query, { limit: 8 });
    if (!results.length) {
      mResults.innerHTML = '<li class="modal-no-results">没有找到相关文章</li>';
      return;
    }
    mResults.innerHTML = results.map(function(r, idx) {
      var item    = r.item;
      var matches = r.matches;
      var titleHtml   = hlChars(item.title || '', getIdx(matches, 'title'));
      var snippetHtml = snippet(item.summary || item.content || '',
                                getIdx(matches, 'summary') || getIdx(matches, 'content'));
      var meta = [item.date, item.readingTime ? item.readingTime + ' min' : '']
                   .filter(Boolean).join(' · ');
      return '<li class="modal-result' + (idx === 0 ? ' modal-result--active' : '') + '"'
           + ' data-href="' + esc(item.permalink) + '">'
           + '<div class="modal-result-title">' + titleHtml + '</div>'
           + '<div class="modal-result-snippet">' + snippetHtml + '</div>'
           + (meta ? '<div class="modal-result-meta">' + esc(meta) + '</div>' : '')
           + '</li>';
    }).join('');
  }

   
  function openModal() {
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    mInput.focus();
    loadFuseAndIndex(function() {
      if (mInput.value.trim()) renderResults(mInput.value.trim());
    });
  }

  function closeModal() {
    modal.hidden = true;
    document.body.style.overflow = '';
    mInput.value = '';
    mResults.innerHTML = '';
  }

   
  
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      modal.hidden ? openModal() : closeModal();
    }
    if (!modal.hidden && e.key === 'Escape') closeModal();
  });

  
  document.querySelectorAll('a[href*="/search/"]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      openModal();
    });
  });

  
  backdrop.addEventListener('click', closeModal);

  
  modal.querySelector('.search-modal-esc').addEventListener('click', closeModal);

   
  mInput.addEventListener('input', function() {
    var q = this.value.trim();
    if (!indexLoaded) { loadFuseAndIndex(function(){ renderResults(q); }); return; }
    renderResults(q);
  });

   
  mInput.addEventListener('keydown', function(e) {
    var items  = Array.from(mResults.querySelectorAll('.modal-result'));
    if (!items.length) return;
    var active = mResults.querySelector('.modal-result--active');
    var idx    = items.indexOf(active);

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (active) active.classList.remove('modal-result--active');
      (items[idx + 1] || items[0]).classList.add('modal-result--active');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (active) active.classList.remove('modal-result--active');
      (items[idx - 1] || items[items.length - 1]).classList.add('modal-result--active');
    } else if (e.key === 'Enter') {
      var target = mResults.querySelector('.modal-result--active');
      if (target && target.dataset.href) window.location.href = target.dataset.href;
    }
  });

  
  mResults.addEventListener('mousemove', function(e) {
    var item = e.target.closest('.modal-result');
    if (!item) return;
    mResults.querySelectorAll('.modal-result--active').forEach(function(el){ el.classList.remove('modal-result--active'); });
    item.classList.add('modal-result--active');
  });

  
  mResults.addEventListener('click', function(e) {
    var item = e.target.closest('.modal-result');
    if (item && item.dataset.href) window.location.href = item.dataset.href;
  });
})();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
