        - paragraph [ref=e29]: 测试一下博客
        - paragraph [ref=e30]: 这是我的第一篇博客，目前还没想好写什么。
        - paragraph [ref=e31]: 这是用hugo+github的静态页面托管构建的：
        - list [ref=e32]:
          - listitem [ref=e33]:
            - paragraph [ref=e34]: 创建两个仓库：username/username.github.io(同时也是用于访问博客的域名)，blog(或者其它名字也行)
          - listitem [ref=e35]:
            - paragraph [ref=e36]: blog用于存放hugo源文件，username.github.io用于存放静态网站文件
          - listitem [ref=e37]:
            - paragraph [ref=e38]: 在blog中创建.github/workflow/deploy.yml配置github action，可以将blog仓库的修改同步到username.github.io
            - paragraph [ref=e39]: 下面是deploy.yml的基本配置：
            - code [ref=e42]:
              - generic [ref=e44]: "name: Deploy Hugo site to Pages"
              - generic [ref=e47]: "on:"
              - generic [ref=e49]: "push:"
              - generic [ref=e51]: "branches:"
              - generic [ref=e53]: "- main #改成自己的blog仓库分支"
              - generic [ref=e56]: "jobs:"
              - generic [ref=e58]: "build-deploy:"
              - generic [ref=e60]: "runs-on: ubuntu-latest"
              - generic [ref=e62]: "steps:"
              - generic [ref=e64]: "- name: Checkout"
              - generic [ref=e66]: "uses: actions/checkout@v4"
              - generic [ref=e68]: "with:"
              - generic [ref=e70]: "submodules: true"
              - generic [ref=e72]: "fetch-depth: 0"
              - generic [ref=e75]: "- name: Setup Hugo"
              - generic [ref=e77]: "uses: peaceiris/actions-hugo@v2"
              - generic [ref=e79]: "with:"
              - generic [ref=e81]: "hugo-version: 'latest'"
              - generic [ref=e83]: "extended: true"
              - generic [ref=e86]: "- name: Build"
              - generic [ref=e88]: "run: hugo --minify"
              - generic [ref=e91]: "- name: Deploy"
              - generic [ref=e93]: "uses: peaceiris/actions-gh-pages@v3"
              - generic [ref=e95]: "with:"
              - generic [ref=e97]: "personal_token: ${{ secrets.PERSONAL_TOKEN }}"
              - generic [ref=e99]: "external_repository: username/username.github.io"
              - generic [ref=e101]: "publish_branch: main"
              - generic [ref=e103]: "publish_dir: ./public"
              - generic [ref=e105]: "commit_message: ${{ github.event.head_commit.message }}"
            - blockquote [ref=e106]:
              - paragraph [ref=e107]: PERSONAL_TOKEN是在仓库settings中创建的repository secrets的name(当然，也可以是其它名字)，对应的secrets就是你的github access token。
            - paragraph [ref=e108]: 说实话，我也是第一次用actions哈哈😅，之前比较少跨仓。
            - paragraph [ref=e109]: 站点目前还有不少需要完善的，比如评论、点赞之类的功能，之后再回来研究吧。。
        - paragraph [ref=e110]: 有空回来更新哈哈。。（手动狗头）
